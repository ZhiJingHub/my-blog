name: 友链申请
description: 申请交换友情链接
title: "[友链] "
labels: ["friend-link"]
body:
  - type: input
    id: name
    attributes:
      label: 站点名称
      placeholder: "你的博客名称"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: 站点地址
      placeholder: "https://your-blog.com"
    validations:
      required: true

  - type: input
    id: avatar
    attributes:
      label: 头像地址
      placeholder: "https://your-blog.com/avatar.png"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: 站点描述
      placeholder: "一句话介绍你的博客"
    validations:
      required: true

  - type: input
    id: backlink
    attributes:
      label: 友链页面地址
      description: "你站点上放置本站友链的页面 URL（用于双向链接验证）"
      placeholder: "https://your-blog.com/friends"
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: 确认事项
      options:
        - label: 我已在我的站点添加了贵站的友链
          required: true
        - label: 我的站点内容合法合规
          required: true
